services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag_scraper
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag_scraper"]
      interval: 5s
      timeout: 5s
      retries: 5

  scraper:
    build: ./scraper
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://rag:rag@postgres:5432/rag_scraper

  api:
    build: ./api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://rag:rag@postgres:5432/rag_scraper
    ports:
      - "8000:8000"

  ui:
    build: ./ui
    ports:
      - "4173:4173"

volumes:
  pgdata:
