name: CI

on:
  push:
    paths:
      - "Distributed-RAG-Based-Web-Scraper-Framework/**"
  pull_request:
    paths:
      - "Distributed-RAG-Based-Web-Scraper-Framework/**"

jobs:
  scraper:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Distributed-RAG-Based-Web-Scraper-Framework/scraper
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt -e .
      - run: ruff check .
      - run: pytest

  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Distributed-RAG-Based-Web-Scraper-Framework/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # -e ../scraper is separate from requirements-dev.txt on purpose: pip
      # resolves a local -e path relative to the CWD it's invoked from (here,
      # api/), not relative to whatever file referenced it, so it can't live
      # inside requirements.txt without breaking the Docker build's different
      # CWD -- see api/requirements.txt's comment and DECISIONS.md.
      - run: pip install -r requirements-dev.txt -e . -e ../scraper
      - run: ruff check .
      - run: pytest

  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Distributed-RAG-Based-Web-Scraper-Framework/ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: Distributed-RAG-Based-Web-Scraper-Framework/ui/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
